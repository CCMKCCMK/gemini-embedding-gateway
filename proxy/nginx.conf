# ============================================================
# Gemini API 透明反向代理 - nginx.conf
# 完全替代 Cloudflare Worker，无需任何代码修改
# ============================================================

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # DNS 解析器（Google Public DNS）
    resolver 8.8.8.8 8.8.4.4 valid=60s ipv6=off;
    resolver_timeout 10s;

    # 连接复用 - 减少 TLS 握手开销
    keepalive_timeout 65;
    keepalive_requests 1000;

    # 日志格式
    log_format proxy '$remote_addr - [$time_local] '
                     '"$request" $status $body_bytes_sent '
                     'upstream=$upstream_addr rt=$request_time';
    access_log /var/log/nginx/access.log proxy;
    error_log  /var/log/nginx/error.log warn;

    # 隐藏 nginx 版本（安全）
    server_tokens off;

    # 关闭代理缓冲，支持流式响应
    proxy_buffering off;
    proxy_request_buffering off;

    server {
        listen 10000;  # Render 要求使用 10000 端口

        # ── 健康检查端点（对标 CF Worker /health）──────────────
        location = /health {
            default_type application/json;
            add_header Access-Control-Allow-Origin * always;
            add_header Cache-Control no-cache always;
            return 200 '{"status":"ok","node":"nginx-proxy","region":"$hostname","time":"$time_iso8601"}';
        }

        # ── CORS 预检处理 ──────────────────────────────────────
        location / {
            # OPTIONS 预检
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET,POST,OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' '*' always;
                add_header 'Access-Control-Max-Age' 86400 always;
                add_header 'Content-Length' 0;
                return 204;
            }

            # ── 核心：透明代理到 Google API ───────────────────
            proxy_pass https://generativelanguage.googleapis.com;

            # TLS SNI - 让 Google 服务器知道目标域名
            proxy_ssl_server_name on;
            proxy_ssl_name        generativelanguage.googleapis.com;
            proxy_ssl_protocols   TLSv1.2 TLSv1.3;

            # 设置正确的 Host 头
            proxy_set_header Host generativelanguage.googleapis.com;

            # 清理来源 IP 信息（安全 + 对标 CF Worker 的 headers.delete）
            proxy_set_header X-Real-IP          "";
            proxy_set_header X-Forwarded-For    "";
            proxy_set_header CF-Connecting-IP   "";
            proxy_set_header CF-IPCountry       "";
            proxy_set_header CF-Ray             "";

            # HTTP/1.1 连接复用
            proxy_http_version 1.1;
            proxy_set_header   Connection "";

            # 超时配置（batchEmbedContents 100条可能较慢）
            proxy_connect_timeout 15s;
            proxy_send_timeout    60s;
            proxy_read_timeout    120s;

            # 响应头 - 添加 CORS 和节点标识
            add_header Access-Control-Allow-Origin * always;
            add_header X-Proxy-Node $hostname always;

            # 错误处理
            proxy_intercept_errors off;
        }
    }
}
